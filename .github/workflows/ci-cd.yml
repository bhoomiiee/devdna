name: DevDNA CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devdna

jobs:
  # ── 1. LINT & TYPE CHECK ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: devdna/frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: devdna/frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: devdna/frontend

  # ── 2. BUILD DOCKER IMAGES ────────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./devdna/backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devdna-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./devdna/frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devdna-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. DEPLOY ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy via Argo CD
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Update image tag in K8s manifests
        run: |
          sed -i "s|:latest|:${{ github.sha }}|g" devdna/k8s/backend-deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" devdna/k8s/frontend-deployment.yaml
      - name: Commit updated manifests
        run: |
          git config user.email "ci@devdna.app"
          git config user.name "DevDNA CI"
          git add devdna/k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push

name: PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: devdna/frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: devdna/frontend

      - name: Build check
        run: npm run build
        working-directory: devdna/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

# DO NOT commit real values — use kubectl create secret or Sealed Secrets
# kubectl create secret generic devdna-secrets \
#   --from-literal=GROQ_API_KEY=your_key \
#   --from-literal=GEMINI_API_KEY=your_key \
#   --from-literal=GITHUB_TOKEN=your_token \
#   --from-literal=JWT_SECRET=your_jwt_secret \
#   --from-literal=REDIS_URL=redis://devdna-redis:6379 \
#   -n devdna
apiVersion: v1
kind: Secret
metadata:
  name: devdna-secrets
  namespace: devdna
type: Opaque
stringData:
  GROQ_API_KEY: "REPLACE_ME"
  GEMINI_API_KEY: "REPLACE_ME"
  GITHUB_TOKEN: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_WITH_RANDOM_STRING"
  REDIS_URL: "redis://devdna-redis:6379"

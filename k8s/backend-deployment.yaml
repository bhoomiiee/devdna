apiVersion: apps/v1
kind: Deployment
metadata:
  name: devdna-backend
  namespace: devdna
  labels:
    app: devdna-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devdna-backend
  template:
    metadata:
      labels:
        app: devdna-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/bhoomiiee/devdna-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devdna-secrets
                  key: GROQ_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devdna-secrets
                  key: GEMINI_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: devdna-secrets
                  key: GITHUB_TOKEN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: devdna-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: devdna-secrets
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: devdna-backend
  namespace: devdna
spec:
  selector:
    app: devdna-backend
  ports:
    - port: 4000
      targetPort: 4000
  type: ClusterIP

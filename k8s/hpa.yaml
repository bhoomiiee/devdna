# Horizontal Pod Autoscaler — scales backend based on CPU usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devdna-backend-hpa
  namespace: devdna
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devdna-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devdna-frontend-hpa
  namespace: devdna
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devdna-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

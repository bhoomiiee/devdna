apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devdna-ingress
  namespace: devdna
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - devdna.app
        - api.devdna.app
      secretName: devdna-tls
  rules:
    - host: devdna.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devdna-frontend
                port:
                  number: 3000
    - host: api.devdna.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devdna-backend
                port:
                  number: 4000
